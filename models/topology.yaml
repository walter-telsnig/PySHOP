model:
  reservoir:
    UpperRes:
      max_vol: 10.0
      lrl: 90.0
      hrl: 100.0
      vol_head:
        x: [0, 10]
        y: [90, 100]
        ref: 0.0
    LowerRes:
      max_vol: 20.0
      lrl: 40.0
      hrl: 50.0
      vol_head:
        x: [0, 20]
        y: [40, 50]
        ref: 0.0
  
  plant:
    ToyPlant:
      outlet_line: 40.0
      main_loss: [0.0]
      penstock_loss: [0.0]

  generator:
    Turbine1:
      penstock: 1
      p_min: 0.0
      p_max: 50.0
      p_nom: 50.0
      gen_eff_curve:
        x: [0, 50]
        y: [95, 95]
        ref: 0.0
      turb_eff_curves:
        - x: [0, 10, 50]
          y: [80, 90, 90]
          ref: 40.0
        - x: [0, 10, 50]
          y: [80, 90, 90]
          ref: 50.0
        - x: [0, 10, 50]
          y: [80, 90, 90]
          ref: 60.0

  pump:
    Pump1:
      penstock: 1
      p_min: 10.0
      p_max: 30.0
      p_nom: 30.0
      gen_eff_curve:
        x: [0, 30]
        y: [95, 95]
        ref: 0.0
      turb_eff_curves: # Using turb_eff_curves as identified in explore_pump.py
        - x: [10, 20, 30]
          y: [85, 85, 85]
          ref: 40.0
        - x: [10, 20, 30]
          y: [85, 85, 85]
          ref: 50.0
        - x: [10, 20, 30]
          y: [85, 85, 85]
          ref: 60.0

connections:
  - from: UpperRes
    to: ToyPlant
    type: plant
  - from: ToyPlant
    to: LowerRes
    type: plant
  - from: ToyPlant
    to: Turbine1
    type: generator
  - from: ToyPlant
    to: Pump1
    type: pump
